services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /data/postgres
    volumes:
      - postgres_data:/data/postgres
    ports:
      - "5432:5432"
  app:
    container_name: app_go
    env_file:
      - .env.docker
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8000"

volumes:
  postgres_data: